<div class="modal-backdrop" *ngIf="visible" @backdropAnimation (click)="onBackdropClick($event)">
  <div class="confirmation-modal-card" @cardAnimation>
    <div class="icon-container" [style.background]="getIconColor() + '15'">
      <i class="pi" [ngClass]="getIcon()" [style.color]="getIconColor()"></i>
    </div>

    <h2 class="modal-title">{{ getTitle() }}</h2>

    <p class="modal-message">{{ message }}</p>

    <div class="modal-actions">
      <button
        pButton
        type="button"
        [label]="cancelLabel"
        class="p-button-text p-button-secondary"
        [disabled]="loading"
        (click)="onCancel()">
      </button>

      <button
        pButton
        type="button"
        [label]="confirmLabel"
        [class]="type === 'delete' ? 'p-button-danger' : 'p-button-primary'"
        [disabled]="loading"
        [loading]="loading"
        (click)="onConfirm()">
      </button>
    </div>
  </div>
</div>
