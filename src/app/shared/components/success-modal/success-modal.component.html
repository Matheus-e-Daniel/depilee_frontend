<!-- src/app/shared/components/success-modal/success-modal.component.html -->
<div class="modal-backdrop" *ngIf="visible" @backdropAnimation (click)="onBackdropClick($event)">
  <div class="success-modal-card" @cardAnimation>
    <!-- Loader / Check Container -->
    <div class="icon-container">
      <div class="spinner-check" [class.transform-to-check]="showSuccess()">
        <!-- Spinner Circle -->
        <svg class="spinner-svg" viewBox="0 0 50 50">
          <circle class="spinner-circle" cx="25" cy="25" r="20" fill="none" stroke-width="4"></circle>
        </svg>

        <!-- Check Mark -->
        <svg class="check-svg" viewBox="0 0 52 52">
          <circle class="check-circle" cx="26" cy="26" r="25" fill="none"/>
          <path class="check-mark" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
        </svg>
      </div>
    </div>

    <!-- Message -->
    <p class="success-message" *ngIf="showSuccess()">{{ message }}</p>
  </div>
</div>
