<!-- src/app/shared/components/success-modal/success-modal.component.html -->
<div class="modal-backdrop" *ngIf="visible" @modalAnimation (click)="onBackdropClick($event)">
  <div class="success-modal-card">
    <!-- Loader -->
    <div class="loader-container" *ngIf="showLoader()">
      <div class="spinner"></div>
    </div>

    <!-- Check Icon -->
    <div class="check-container" *ngIf="showCheck()" [@checkAnimation]="checkState">
      <svg class="check-icon" viewBox="0 0 52 52">
        <circle class="check-circle" cx="26" cy="26" r="25" fill="none"/>
        <path class="check-mark" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
      </svg>
    </div>

    <!-- Message -->
    <p class="success-message" *ngIf="showCheck()">{{ message }}</p>
  </div>
</div>
