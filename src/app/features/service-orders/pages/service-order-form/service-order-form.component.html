<!-- src/app/features/service-orders/pages/service-order-form/service-order-form.component.html -->
<div class="service-order-form-container w-full">
  <div class="header">
    <button
      pButton
      icon="pi pi-arrow-left"
      pTooltip="Voltar"
      tooltipPosition="top"
      class="p-button-text p-button-sm"
      (click)="onCancel()">
    </button>

    <h1>Nova Ordem de Serviço</h1>
  </div>

  <div class="card">
    <p-card>
      <form [formGroup]="orderForm" (ngSubmit)="onSubmit()" class="service-order-form">
        <div class="form-grid">
          <!-- Cliente -->
          <div class="field col-12 md:col-6">
            <label for="clientId" class="block font-medium mb-2">Cliente (opcional)</label>
            <p-dropdown
              id="clientId"
              formControlName="clientId"
              [options]="clients()"
              optionLabel="name"
              optionValue="id"
              placeholder="Selecione o cliente"
              [loading]="clientsLoading()"
              [showClear]="true"
              class="w-full">
              <ng-template pTemplate="empty">
                <div class="p-2">Nenhum cliente encontrado</div>
              </ng-template>
            </p-dropdown>
          </div>

          <!-- Desconto -->
          <div class="field col-12 md:col-6">
            <label for="discount" class="block font-medium mb-2">Desconto (opcional)</label>
            <p-inputNumber
              id="discount"
              formControlName="discount"
              mode="currency"
              currency="BRL"
              locale="pt-BR"
              class="w-full"
              [showButtons]="false"
              [minFractionDigits]="2"
              placeholder="R$ 0,00">
            </p-inputNumber>

            <small
              *ngIf="orderForm.get('discount')?.invalid && orderForm.get('discount')?.touched"
              class="p-error block mt-1">
              Valor mínimo: R$ 0,00
            </small>
          </div>

          <!-- Total -->
          <div class="field col-12 md:col-6">
            <label for="total" class="block font-medium mb-2">Total *</label>
            <p-inputNumber
              id="total"
              formControlName="total"
              mode="currency"
              currency="BRL"
              locale="pt-BR"
              class="w-full"
              [showButtons]="false"
              [minFractionDigits]="2"
              placeholder="R$ 0,00">
            </p-inputNumber>

            <small
              *ngIf="orderForm.get('total')?.invalid && orderForm.get('total')?.touched"
              class="p-error block mt-1">
              <span *ngIf="orderForm.get('total')?.errors?.['required']">Total é obrigatório</span>
              <span *ngIf="orderForm.get('total')?.errors?.['min']">Valor mínimo: R$ 0,01</span>
            </small>
          </div>

          <!-- Observações -->
          <div class="field col-12">
            <label for="notes" class="block font-medium mb-2">Observações (opcional)</label>
            <textarea
              id="notes"
              pInputTextarea
              formControlName="notes"
              rows="4"
              class="w-full"
              placeholder="Digite observações sobre a ordem de serviço..."></textarea>
          </div>
        </div>

        <!-- Seção de Itens -->
        <div class="mt-5">
          <h2 class="text-xl font-semibold mb-4">Itens da Ordem de Serviço</h2>
          <div class="form-grid">
            <!-- Produto -->
            <div class="field col-12 md:col-6">
              <label for="productId" class="block font-medium mb-2">Produto</label>
              <p-dropdown
                id="productId"
                formControlName="productId"
                [options]="products()"
                optionLabel="name"
                optionValue="id"
                placeholder="Selecione um produto"
                [loading]="productsLoading()"
                [showClear]="true"
                (onChange)="onProductChange($event.value)"
                class="w-full">
                <ng-template pTemplate="empty">
                  <div class="p-2">Nenhum produto encontrado</div>
                </ng-template>
              </p-dropdown>
            </div>

            <!-- Serviço -->
            <div class="field col-12 md:col-6">
              <label for="serviceId" class="block font-medium mb-2">Serviço</label>
              <p-dropdown
                id="serviceId"
                formControlName="serviceId"
                [options]="services()"
                optionLabel="name"
                optionValue="id"
                placeholder="Selecione um serviço"
                [loading]="servicesLoading()"
                [showClear]="true"
                (onChange)="onServiceChange($event.value)"
                class="w-full">
                <ng-template pTemplate="empty">
                  <div class="p-2">Nenhum serviço encontrado</div>
                </ng-template>
              </p-dropdown>
            </div>

            <!-- Quantidade -->
            <div class="field col-12 md:col-6">
              <label for="quantity" class="block font-medium mb-2">Quantidade *</label>
              <p-inputNumber
                id="quantity"
                formControlName="quantity"
                class="w-full"
                [min]="1"
                [showButtons]="true">
              </p-inputNumber>

              <small
                *ngIf="orderForm.get('quantity')?.invalid && orderForm.get('quantity')?.touched"
                class="p-error block mt-1">
                <span *ngIf="orderForm.get('quantity')?.errors?.['required']">Quantidade é obrigatória</span>
                <span *ngIf="orderForm.get('quantity')?.errors?.['min']">Valor mínimo: 1</span>
              </small>
            </div>

            <!-- Preço Unitário -->
            <div class="field col-12 md:col-6">
              <label for="unitPrice" class="block font-medium mb-2">Preço Unitário *</label>
              <p-inputNumber
                id="unitPrice"
                formControlName="unitPrice"
                mode="currency"
                currency="BRL"
                locale="pt-BR"
                class="w-full"
                [showButtons]="false"
                [minFractionDigits]="2">
              </p-inputNumber>

              <small
                *ngIf="orderForm.get('unitPrice')?.invalid && orderForm.get('unitPrice')?.touched"
                class="p-error block mt-1">
                <span *ngIf="orderForm.get('unitPrice')?.errors?.['required']">Preço unitário é obrigatório</span>
                <span *ngIf="orderForm.get('unitPrice')?.errors?.['min']">Valor mínimo: R$ 0,01</span>
              </small>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button
            pButton
            type="button"
            label="Cancelar"
            class="p-button-text"
            [disabled]="loading()"
            (click)="onCancel()">
          </button>

          <button
            pButton
            type="submit"
            label="Criar Ordem"
            class="p-button-primary"
            [disabled]="orderForm.invalid || loading()">
            <i *ngIf="loading()" class="pi pi-spin pi-spinner ml-2"></i>
          </button>
        </div>
      </form>
    </p-card>
  </div>
</div>

<p-toast></p-toast>
