<form [formGroup]="paymentMethodForm" (ngSubmit)="onSubmit()">
  <div>
    <label>Nome</label>
    <input formControlName="name" />
  </div>
  <div>
    <label>Tipo</label>
    <input formControlName="type" />
  </div>
  <div>
    <label>Permite Parcelamento?</label>
    <input type="checkbox" formControlName="allowInstallments" />
  </div>
  <div>
    <label>Máximo de Parcelas</label>
    <input type="number" formControlName="maxInstallments" />
  </div>
  <div>
    <label>Taxa de Juros por Parcela (%)</label>
    <input type="number" step="0.01" formControlName="interestRatePerInstallment" />
  </div>
  <div>
    <label>Taxa (%)</label>
    <input type="number" step="0.01" formControlName="feePercentage" />
  </div>
  <div>
    <label>Descrição</label>
    <input formControlName="description" />
  </div>
  <button type="submit">Salvar</button>
</form>
