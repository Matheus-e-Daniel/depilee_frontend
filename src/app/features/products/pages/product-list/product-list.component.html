<div class="product-list-container w-full">
  <div class="header">
    <div class="title-section">
      <h1>Produtos</h1>
      <p>Gerencie seu catálogo de produtos</p>
    </div>
    <button
      pButton
      icon="pi pi-plus"
      label="Novo Produto"
      class="p-button-primary"
      (click)="newProduct()">
    </button>
  </div>

  <div class="filters-card">
    <div class="filters-header">
      <div class="filters-title">
        <i class="pi pi-filter"></i>
        <h3>Filtros</h3>
      </div>
      <button
        pButton
        icon="pi pi-times"
        label="Limpar Filtros"
        class="p-button-text p-button-sm clear-filters-btn"
        (click)="clearFilters()">
      </button>
    </div>
    <div class="filters-content">
      <div class="filter-group">
        <label for="searchTerm">Buscar por nome ou marca</label>
        <span class="p-input-icon-right w-full">
          <input
            id="searchTerm"
            type="text"
            pInputText
            placeholder="Digite o nome ou marca..."
            [ngModel]="searchTerm()"
            (ngModelChange)="searchTerm.set($event)"
            class="w-full product-search-input" />
        </span>
      </div>
      <div class="filter-group">
        <label for="sortOrder">Ordenar por</label>
        <p-dropdown
          id="sortOrder"
          [options]="sortOptions"
          [ngModel]="sortOrder()"
          (ngModelChange)="sortOrder.set($event)"
          optionLabel="label"
          optionValue="value"
          placeholder="Selecione a ordenação"
          class="w-full">
        </p-dropdown>
      </div>
    </div>
  </div>

  <div class="card">
    <p-table
      [value]="products()"
      [loading]="loading()"
      styleClass="p-datatable-striped"
      [paginator]="true"
      [rows]="10"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} produtos">

      <ng-template pTemplate="header">
        <tr>
          <th>Nome</th>
          <th>Custo</th>
          <th>Preço</th>
          <th>Estoque</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-product>
        <tr>
          <td data-label="Nome">{{ product.name }}</td>
          <td data-label="Custo">{{ product.cost | currency:'BRL' }}</td>
          <td data-label="Preço">{{ product.price | currency:'BRL' }}</td>
          <td data-label="Estoque">
            <span [class]="product.stock === 0 ? 'text-red-500 font-semibold' : ''">
              {{ product.stock }}
            </span>
          </td>
          <td data-label="Status">
            <p-tag
              [value]="product.stock > 0 ? 'Disponível' : 'Esgotado'"
              [severity]="product.stock > 0 ? 'success' : 'danger'">
            </p-tag>
          </td>
          <td data-label="Ações">
            <div class="action-buttons">
              <button
                pButton
                icon="pi pi-pencil"
                class="p-button-sm p-button-primary mr-2"
                (click)="editProduct(product.id)">
              </button>
              <button
                pButton
                icon="pi pi-trash"
                class="p-button-sm p-button-danger"
                (click)="deleteProduct(product.id, product.name)">
              </button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="text-center py-5">
            <div class="empty-state">
              <i class="pi pi-box" style="font-size: 3rem; color: #ccc"></i>
              <h3>Nenhum produto encontrado</h3>
              <p>Comece adicionando seu primeiro produto</p>
              <button
                pButton
                icon="pi pi-plus"
                label="Novo Produto"
                class="p-button-outlined mt-3"
                (click)="newProduct()">
              </button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<app-confirmation-modal
  [visible]="!!productToDelete"
  [type]="'delete'"
  [loading]="confirmationLoading()"
  [message]="getDeleteMessage()"
  (confirm)="confirmDelete()"
  (cancel)="cancelDelete()">
</app-confirmation-modal>

<app-success-modal
  [visible]="successModalService.visible()"
  [message]="successModalService.message()"
  (visibleChange)="successModalService.hide()">
</app-success-modal>
