<div class="product-form-container w-full">
  <div class="header">
    <button
      pButton
      icon="pi pi-arrow-left"
      pTooltip="Voltar"
      tooltipPosition="top"
      class="p-button-text p-button-sm"
      (click)="onCancel()">
    </button>

    <h1>{{ isEditMode() ? 'Editar Produto' : 'Novo Produto' }}</h1>
  </div>

  <div class="card">
    <p-card>
      <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="product-form">
        <div class="form-grid">
          <div class="field col-12">
            <label for="name" class="block font-medium mb-2">Nome *</label>
            <input
              id="name"
              type="text"
              pInputText
              formControlName="name"
              class="w-full"
              placeholder="Digite o nome do produto" />

            <small
              *ngIf="productForm.get('name')?.invalid && formSubmitted()"
              class="p-error block mt-1">
              <span *ngIf="productForm.get('name')?.errors?.['required']">Nome é obrigatório</span>
              <span *ngIf="productForm.get('name')?.errors?.['minlength']">Mínimo 3 caracteres</span>
            </small>
          </div>

          <div class="field col-12">
            <label for="description" class="block font-medium mb-2">Descrição</label>
            <textarea
              id="description"
              pInputTextarea
              formControlName="description"
              rows="3"
              class="w-full"
              placeholder="Descreva o produto (opcional)"></textarea>
          </div>

          <div class="field col-12">
            <label for="salePrice" class="block font-medium mb-2">Preço *</label>
            <input
              id="salePrice"
              type="text"
              pInputText
              formControlName="salePrice"
              class="w-full"
              placeholder="R$ 0,00"
              (focus)="onCurrencyFocus($event)"
              (input)="onCurrencyInput($event)"
              (blur)="formatCurrencyOnBlur($event, 'salePrice')" />

            <small
              *ngIf="productForm.get('salePrice')?.invalid && formSubmitted()"
              class="p-error block mt-1">
              <span *ngIf="productForm.get('salePrice')?.errors?.['required']">Preço é obrigatório</span>
              <span *ngIf="productForm.get('salePrice')?.errors?.['min']">Valor mínimo: R$ 0,01</span>
            </small>
          </div>

          <div class="field col-6">
            <label for="stock" class="block font-medium mb-2">Estoque *</label>
            <input
              id="stock"
              type="text"
              pInputText
              formControlName="stock"
              class="w-full"
              placeholder="Ex: 10"
              (blur)="formatNumberOnBlur($event, 'stock')" />

            <small
              *ngIf="productForm.get('stock')?.invalid && formSubmitted()"
              class="p-error block mt-1">
              <span *ngIf="productForm.get('stock')?.errors?.['required']">Estoque é obrigatório</span>
              <span *ngIf="productForm.get('stock')?.errors?.['min']">Valor mínimo: 0</span>
            </small>
          </div>

          <div class="field col-6">
            <label for="brandId" class="block font-medium mb-2">Marca *</label>
            <p-dropdown
              id="brandId"
              formControlName="brandId"
              [options]="brands()"
              optionLabel="name"
              optionValue="id"
              placeholder="Selecione uma marca"
              [loading]="brandsLoading()"
              class="w-full">
              <ng-template pTemplate="empty">
                <div class="p-2">Nenhuma marca encontrada</div>
              </ng-template>
            </p-dropdown>

            <small
              *ngIf="productForm.get('brandId')?.invalid && formSubmitted()"
              class="p-error block mt-1">
              <span *ngIf="productForm.get('brandId')?.errors?.['required']">Marca é obrigatória</span>
            </small>
          </div>

          <div class="field col-6">
            <label for="categoryId" class="block font-medium mb-2">Categoria *</label>
            <p-dropdown
              id="categoryId"
              formControlName="categoryId"
              [options]="categories()"
              optionLabel="name"
              optionValue="id"
              placeholder="Selecione uma categoria"
              [loading]="categoriesLoading()"
              class="w-full">
              <ng-template pTemplate="empty">
                <div class="p-2">Nenhuma categoria encontrada</div>
              </ng-template>
            </p-dropdown>

            <small
              *ngIf="productForm.get('categoryId')?.invalid && formSubmitted()"
              class="p-error block mt-1">
              <span *ngIf="productForm.get('categoryId')?.errors?.['required']">Categoria é obrigatória</span>
            </small>
          </div>
        </div>

        <div class="form-actions">
          <button
            pButton
            type="button"
            label="Cancelar"
            class="p-button-danger"
            [disabled]="loading()"
            (click)="onCancel()">
          </button>

          <button
            pButton
            type="submit"
            [label]="isEditMode() ? 'Atualizar' : 'Criar'"
            class="p-button-primary"
            [disabled]="loading() || (isEditMode() && !formModified())">

            <i *ngIf="loading()" class="pi pi-spin pi-spinner ml-2"></i>
          </button>
        </div>
      </form>
    </p-card>
  </div>
</div>

<app-success-modal [visible]="successModalService.visible()" [message]="successModalService.message()" (visibleChange)="successModalService.hide()"></app-success-modal>

<app-confirmation-modal
  [visible]="showConfirmation()"
  [type]="isEditMode() ? 'update' : 'create'"
  [loading]="confirmationLoading()"
  (confirm)="confirmSubmit()"
  (cancel)="cancelSubmit()">
</app-confirmation-modal>
