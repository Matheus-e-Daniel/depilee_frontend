<!-- src/app/features/brands/pages/brand-list/brand-list.component.html -->
<div class="brand-list-container w-full">

  <div class="header">
    <div class="title-section">
      <h1>Marcas</h1>
      <p>Gerencie seu cadastro de marcas</p>
    </div>
    <button
      pButton
      icon="pi pi-plus"
      label="Nova Marca"
      class="p-button-primary"
      (click)="newBrand()">
    </button>
  </div>

  <div class="filters-card">
    <div class="filters-header">
      <div class="filters-title">
        <i class="pi pi-filter"></i>
        <h3>Filtros</h3>
      </div>
      <button
        pButton
        icon="pi pi-times"
        label="Limpar Filtros"
        class="p-button-text p-button-sm clear-filters-btn"
        (click)="searchValue = ''; sortOrderValue = 'desc';"
      ></button>
    </div>
    <div class="filters-content">
      <div class="filter-group">
        <label for="brandSearch">Buscar por nome</label>
        <span class="p-input-icon-right w-full">
          <input
            id="brandSearch"
            type="text"
            pInputText
            placeholder="Digite o nome da marca..."
            [ngModel]="searchValue"
            (ngModelChange)="searchValue = $event"
            class="w-full brand-search-input"
          />
        </span>
      </div>
      <div class="filter-group">
        <label for="brandSort">Ordenar por</label>
        <p-dropdown
          id="brandSort"
          [options]="sortOptions"
          [ngModel]="sortOrderValue"
          (ngModelChange)="sortOrderValue = $event"
          optionLabel="label"
          optionValue="value"
          placeholder="Selecione a ordenação"
          class="w-full"
        ></p-dropdown>
      </div>
    </div>
  </div>

  <div class="card">
    <p-table
      [value]="filteredBrands()"
      [loading]="loading()"
      styleClass="p-datatable-striped"
      [paginator]="true"
      [rows]="10"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} marcas">

      <ng-template pTemplate="header">
        <tr>
          <th>Nome</th>
          <th>Ações</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-brand>
        <tr>
          <td data-label="Nome">{{ brand.name }}</td>
          <td data-label="Ações">
            <div class="action-buttons">
              <button
                pButton
                icon="pi pi-pencil"
                class="p-button-sm p-button-primary mr-2"
                (click)="editBrand(brand.id)">
              </button>
              <button
                pButton
                icon="pi pi-trash"
                class="p-button-sm p-button-danger"
                (click)="deleteBrand(brand.id, brand.name)">
              </button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="2" class="text-center py-5">
            <div class="empty-state">
              <i class="pi pi-tag" style="font-size: 3rem; color: #ccc"></i>
              <h3>Nenhuma marca encontrada</h3>
              <p>Comece adicionando sua primeira marca</p>
              <button
                pButton
                icon="pi pi-plus"
                label="Nova Marca"
                class="p-button-outlined mt-3"
                (click)="newBrand()">
              </button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-toast></p-toast>

<app-confirmation-modal
  [visible]="showConfirmation()"
  type="delete"
  [message]="getDeleteMessage()"
  confirmLabel="Excluir"
  cancelLabel="Cancelar"
  [loading]="confirmationLoading()"
  (confirm)="confirmDelete()"
  (cancel)="cancelDelete()">
</app-confirmation-modal>

<app-success-modal
  [visible]="successModalService.visible()"
  [message]="successModalService.message()"
  (visibleChange)="successModalService.hide()">
</app-success-modal>
