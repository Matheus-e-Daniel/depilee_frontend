<div class="brand-form-container w-full">
  <div class="header">
    <button
      pButton
      icon="pi pi-arrow-left"
      pTooltip="Voltar"
      tooltipPosition="top"
      class="p-button-text p-button-sm"
      (click)="onCancel()">
    </button>

    <h1>{{ isEditMode() ? 'Editar Marca' : 'Nova Marca' }}</h1>
  </div>

  <div class="card">
    <p-card>
      <form [formGroup]="brandForm" (ngSubmit)="onSubmit()" class="brand-form">
        <div class="form-grid">
          <div class="field col-12">
            <label for="name" class="block font-medium mb-2">Nome da Marca *</label>
            <input
              id="name"
              type="text"
              pInputText
              formControlName="name"
              class="w-full"
              placeholder="Digite o nome da marca" />

            <small
              *ngIf="brandForm.get('name')?.invalid && formSubmitted()"
              class="p-error block mt-1">
              <span *ngIf="brandForm.get('name')?.errors?.['required']">Nome é obrigatório</span>
              <span *ngIf="brandForm.get('name')?.errors?.['minlength']">Mínimo 2 caracteres</span>
            </small>
          </div>
        </div>

        <div class="form-actions">
          <button
            pButton
            type="button"
            label="Cancelar"
            class="p-button-text"
            [disabled]="confirmationLoading()"
            (click)="onCancel()">
          </button>

          <button
            pButton
            type="submit"
            [label]="isEditMode() ? 'Atualizar' : 'Criar'"
            class="p-button-primary"
            [disabled]="isEditMode() && !formModified()">
          </button>
        </div>
      </form>
    </p-card>
  </div>
</div>

<p-toast></p-toast>

<app-confirmation-modal
  [visible]="showConfirmation()"
  [type]="isEditMode() ? 'update' : 'create'"
  [message]="isEditMode()
    ? 'Tem certeza que deseja atualizar esta marca?'
    : 'Tem certeza que deseja cadastrar esta marca?'"
  [confirmLabel]="isEditMode() ? 'Atualizar' : 'Cadastrar'"
  cancelLabel="Cancelar"
  [loading]="confirmationLoading()"
  (confirm)="confirmSubmit()"
  (cancel)="cancelSubmit()">
</app-confirmation-modal>

<app-success-modal
  [visible]="successModalService.visible()"
  [message]="successModalService.message()"
  (visibleChange)="successModalService.hide()">
</app-success-modal>
