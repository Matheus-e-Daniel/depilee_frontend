<header class="header">
  <button
    pButton
    pRipple
    icon="pi pi-bars"
    class="menu-button"
    (click)="onMenuClick()">
  </button>

  <div class="header-content">
    <h1>Depilee</h1>

    <div class="header-actions">
      <div class="notification-wrapper">
        <button
          pButton
          pRipple
          icon="pi pi-bell"
          class="notification-button"
          (click)="toggleNotificationMenu($event)"
          aria-haspopup="true"
          aria-controls="notification-menu">
          <span
            *ngIf="notificationCount > 0"
            class="notification-badge-custom">
            {{notificationCount}}
          </span>
        </button>
      </div>

      <div class="user-wrapper">
        <button
          pButton
          pRipple
          icon="pi pi-user"
          label="Usuário"
          class="user-button"
          (click)="toggleUserMenu($event)"
          aria-haspopup="true"
          aria-controls="user-menu">
          <i class="pi pi-chevron-down ml-2"></i>
        </button>
      </div>
    </div>
  </div>
</header>

<p-menu
  #notificationMenu
  [model]="notificationItems"
  [popup]="true"
  id="notification-menu"
  [style]="{width: '320px'}">

  <ng-template pTemplate="content">
    <div class="notification-header">
      <h3>Notificações</h3>
      <small>{{notificationCount}} não lidas</small>
    </div>
  </ng-template>

  <ng-template pTemplate="item" let-item>
    <div class="notification-item-wrapper">
      <a class="notification-item" (click)="item.command?.()">
        <i [class]="item.icon" class="notification-icon"></i>
        <div class="notification-content">
          <div class="notification-title">{{item.label}}</div>
          <div class="notification-time" *ngIf="item.badge">{{item.badge}}</div>
        </div>
      </a>
      <button *ngIf="item.id" class="notification-check-btn" title="Marcar como lida" (click)="markNotificationAsRead(item.id, $event)">
        <i class="pi pi-check"></i>
      </button>
    </div>
  </ng-template>
</p-menu>

<p-menu
  #userMenu
  [model]="userMenuItems"
  [popup]="true"
  id="user-menu">
</p-menu>
