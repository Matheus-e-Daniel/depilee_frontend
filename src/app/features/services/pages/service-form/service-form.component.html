<!-- src/app/features/services/pages/service-form/service-form.component.html -->
<div class="service-form-container w-full">
  <div class="header">
    <button
      pButton
      icon="pi pi-arrow-left"
      pTooltip="Voltar"
      tooltipPosition="top"
      class="p-button-text p-button-sm"
      (click)="onCancel()">
    </button>

    <h1>{{ isEditMode() ? 'Editar Serviço' : 'Novo Serviço' }}</h1>
  </div>

  <div class="card">
    <p-card>
      <form [formGroup]="serviceForm" (ngSubmit)="onSubmit()" class="service-form">
        <div class="form-grid">
          <div class="field col-12">
            <label for="name" class="block font-medium mb-2">Nome do Serviço *</label>
            <input
              id="name"
              type="text"
              pInputText
              formControlName="name"
              class="w-full"
              placeholder="Digite o nome do serviço" />

            <small
              *ngIf="serviceForm.get('name')?.invalid && serviceForm.get('name')?.touched"
              class="p-error block mt-1">
              <span *ngIf="serviceForm.get('name')?.errors?.['required']">Nome é obrigatório</span>
              <span *ngIf="serviceForm.get('name')?.errors?.['minlength']">Mínimo 3 caracteres</span>
            </small>
          </div>

          <div class="field col-12">
            <label for="description" class="block font-medium mb-2">Descrição</label>
            <textarea
              id="description"
              pInputTextarea
              formControlName="description"
              rows="3"
              class="w-full"
              placeholder="Descreva o serviço (opcional)"></textarea>
          </div>

          <div class="field col-12 md:col-6">
            <label for="price" class="block font-medium mb-2">Preço *</label>
            <p-inputNumber
              id="price"
              formControlName="price"
              mode="currency"
              currency="BRL"
              locale="pt-BR"
              class="w-full"
              [showButtons]="false"
              [minFractionDigits]="2">
            </p-inputNumber>

            <small
              *ngIf="serviceForm.get('price')?.invalid && serviceForm.get('price')?.touched"
              class="p-error block mt-1">
              <span *ngIf="serviceForm.get('price')?.errors?.['required']">Preço é obrigatório</span>
              <span *ngIf="serviceForm.get('price')?.errors?.['min']">Valor mínimo: R$ 0,01</span>
            </small>
          </div>

          <div class="field col-12 md:col-6">
            <label for="categoryId" class="block font-medium mb-2">Categoria *</label>
            <p-dropdown
              id="categoryId"
              formControlName="categoryId"
              [options]="categories()"
              optionLabel="name"
              optionValue="id"
              placeholder="Selecione uma categoria"
              [loading]="categoriesLoading()"
              class="w-full">
              <ng-template pTemplate="empty">
                <div class="p-2">Nenhuma categoria encontrada</div>
              </ng-template>
            </p-dropdown>

            <small
              *ngIf="serviceForm.get('categoryId')?.invalid && serviceForm.get('categoryId')?.touched"
              class="p-error block mt-1">
              Categoria é obrigatória
            </small>
          </div>
        </div>

        <div class="form-actions">
          <button
            pButton
            type="button"
            label="Cancelar"
            class="p-button-danger"
            [disabled]="loading()"
            (click)="onCancel()">
          </button>

          <button
            pButton
            type="submit"
            [label]="isEditMode() ? 'Atualizar' : 'Criar'"
            class="p-button-primary"
            [disabled]="serviceForm.invalid || loading()">

            <i *ngIf="loading()" class="pi pi-spin pi-spinner ml-2"></i>
          </button>
        </div>
      </form>
    </p-card>
  </div>
</div>

<p-toast></p-toast>
<app-success-modal [visible]="successModalService.visible()" [message]="successModalService.message()" (visibleChange)="successModalService.hide()"></app-success-modal>

<app-confirmation-modal
  [visible]="showConfirmation()"
  [type]="isEditMode() ? 'update' : 'create'"
  [loading]="confirmationLoading()"
  (confirm)="confirmSubmit()"
  (cancel)="cancelSubmit()">
</app-confirmation-modal>
