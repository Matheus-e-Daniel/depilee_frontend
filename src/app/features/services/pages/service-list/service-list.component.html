<div class="service-list-container w-full">
  <div class="header">
    <div class="title-section">
      <h1>Serviços</h1>
      <p>Gerencie seu catálogo de serviços</p>
    </div>
    <button
      pButton
      icon="pi pi-plus"
      label="Novo Serviço"
      class="p-button-primary"
      (click)="newService()">
    </button>
  </div>

  <div class="filters-card">
    <div class="filters-header">
      <div class="filters-title">
        <i class="pi pi-filter"></i>
        <h3>Filtros</h3>
      </div>
      <button
        pButton
        icon="pi pi-times"
        label="Limpar Filtros"
        class="p-button-text p-button-sm clear-filters-btn"
        (click)="clearFilters()">
      </button>
    </div>
    <div class="filters-content">
      <div class="filter-group">
        <label for="searchTerm">Buscar por nome ou categoria</label>
        <span class="p-input-icon-right w-full">
          <input
            id="searchTerm"
            type="text"
            pInputText
            placeholder="Digite o nome ou categoria..."
            [ngModel]="searchTerm()"
            (ngModelChange)="searchTerm.set($event)"
            class="w-full service-search-input" />
        </span>
      </div>
      <div class="filter-group">
        <label for="sortOrder">Ordenar por</label>
        <p-dropdown
          id="sortOrder"
          [options]="sortOptions"
          [ngModel]="sortOrder()"
          (ngModelChange)="sortOrder.set($event)"
          optionLabel="label"
          optionValue="value"
          placeholder="Selecione a ordenação"
          class="w-full">
        </p-dropdown>
      </div>
    </div>
  </div>

  <div class="card">
    <p-table
      [value]="services()"
      [loading]="loading()"
      styleClass="p-datatable-striped"
      [paginator]="true"
      [rows]="10"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} serviços">

      <ng-template pTemplate="header">
        <tr>
          <th>Nome</th>
          <th>Descrição</th>
          <th>Preço</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-service>
        <tr>
          <td data-label="Nome">{{ service.name }}</td>
          <td data-label="Descrição">{{ service.description || '-' }}</td>
          <td data-label="Preço">{{ service.price | currency:'BRL' }}</td>
          <td data-label="Status">
            <p-tag
              [value]="service.status == 1 ? 'Ativo' : 'Inativo'"
              [severity]="service.status == 1 ? 'success' : 'danger'">
            </p-tag>
          </td>
          <td data-label="Ações">
            <div class="action-buttons">
              <button
                pButton
                icon="pi pi-pencil"
                class="p-button-sm p-button-primary mr-2"
                (click)="editService(service.id)">
              </button>
              <button
                pButton
                icon="pi pi-trash"
                class="p-button-sm p-button-danger"
                (click)="deleteService(service.id, service.name)">
              </button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center py-5">
            <div class="empty-state">
              <i class="pi pi-briefcase" style="font-size: 3rem; color: #ccc"></i>
              <h3>Nenhum serviço encontrado</h3>
              <p>Comece adicionando seu primeiro serviço</p>
              <button
                pButton
                icon="pi pi-plus"
                label="Novo Serviço"
                class="p-button-outlined mt-3"
                (click)="newService()">
              </button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<app-confirmation-modal
  [visible]="!!serviceToDelete"
  [type]="'delete'"
  [loading]="confirmationLoading()"
  [message]="getDeleteMessage()"
  (confirm)="confirmDelete()"
  (cancel)="cancelDelete()">
</app-confirmation-modal>

<app-success-modal
  [visible]="successModalService.visible()"
  [message]="successModalService.message()"
  (visibleChange)="successModalService.hide()">
</app-success-modal>
