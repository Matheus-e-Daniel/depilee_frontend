<div class="category-list-container w-full">
  <div class="header">
    <div class="title-section">
      <h1>Categorias</h1>
      <p>Gerencie seu cadastro de categorias</p>
    </div>
    <button
      pButton
      icon="pi pi-plus"
      label="Nova Categoria"
      class="p-button-primary"
      (click)="newCategory()">
    </button>
  </div>

  <div class="filters-card">
    <div class="filters-header">
      <div class="filters-title">
        <i class="pi pi-filter"></i>
        <h3>Filtros</h3>
      </div>
      <button
        pButton
        icon="pi pi-times"
        label="Limpar Filtros"
        class="p-button-text p-button-sm clear-filters-btn"
        (click)="searchValue = ''; sortOrderValue = 'desc';"
      ></button>
    </div>
    <div class="filters-content">
      <div class="filter-group">
        <label for="categorySearch">Buscar por nome</label>
        <span class="p-input-icon-right w-full">
          <input
            id="categorySearch"
            type="text"
            pInputText
            placeholder="Digite o nome da categoria..."
            [ngModel]="searchValue"
            (ngModelChange)="searchValue = $event"
            class="w-full category-search-input"
          />
        </span>
      </div>
      <div class="filter-group">
        <label for="categorySort">Ordenar por</label>
        <p-dropdown
          id="categorySort"
          [options]="sortOptions"
          [ngModel]="sortOrderValue"
          (ngModelChange)="sortOrderValue = $event"
          optionLabel="label"
          optionValue="value"
          placeholder="Selecione a ordenação"
          class="w-full"
        ></p-dropdown>
      </div>
    </div>
  </div>

  <div class="card">
    <p-table
      [value]="filteredCategories()"
      [loading]="loading()"
      styleClass="p-datatable-striped"
      [paginator]="true"
      [rows]="10"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} categorias">

      <ng-template pTemplate="header">
        <tr>
          <th>Nome</th>
          <th>Descrição</th>
          <th>Ações</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-category>
        <tr>
          <td data-label="Nome">{{ category.name }}</td>
          <td data-label="Descrição">{{ category.description || '-' }}</td>
          <td data-label="Ações">
            <div class="action-buttons">
              <button
                pButton
                icon="pi pi-pencil"
                class="p-button-sm p-button-primary mr-2"
                (click)="editCategory(category.id)">
              </button>
              <button
                pButton
                icon="pi pi-trash"
                class="p-button-sm p-button-danger"
                (click)="deleteCategory(category.id, category.name)">
              </button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="3" class="text-center py-5">
            <div class="empty-state">
              <i class="pi pi-list" style="font-size: 3rem; color: #ccc"></i>
              <h3>Nenhuma categoria encontrada</h3>
              <p>Comece adicionando sua primeira categoria</p>
              <button
                pButton
                icon="pi pi-plus"
                label="Nova Categoria"
                class="p-button-outlined mt-3"
                (click)="newCategory()">
              </button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-toast></p-toast>

<app-confirmation-modal
  [visible]="!!categoryToDelete"
  [type]="'delete'"
  [loading]="confirmationLoading()"
  [message]="getDeleteMessage()"
  (confirm)="confirmDelete()"
  (cancel)="cancelDelete()">
</app-confirmation-modal>

<app-success-modal
  [visible]="successModalService.visible()"
  [message]="successModalService.message()"
  (visibleChange)="successModalService.hide()">
</app-success-modal>
