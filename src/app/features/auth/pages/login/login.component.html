<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 px-4">
  <p-card class="w-full max-w-md shadow-2xl border-0"
    [style]="{'background': 'linear-gradient(135deg, #ffffff 0%, #f8fafc 100%)'}">
    <ng-template pTemplate="header">
      <div class="text-center py-6">
        <i class="pi pi-lock text-4xl text-indigo-600 mb-3"></i>
        <h1 class="text-2xl font-bold text-gray-800">Acessar Depilee</h1>
        <p class="text-gray-600 mt-2">Entre em sua conta para continuar</p>
      </div>
    </ng-template>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
      <!-- Campos do formulário permanecem iguais -->
      <div class="field">
        <span class="p-float-label custom-label">
          <label for="email" class="font-medium">
            <i class="pi pi-envelope mr-2"></i>Email
          </label>
          <input id="email" type="email" pInputText formControlName="email" class="w-full p-3" [ngClass]="{'p-invalid': loginForm.get('email')?.invalid && loginForm.get('email')?.touched}" />
        </span>
      </div>

      <div class="field">
        <span class="p-float-label custom-label">
          <p-password id="password" formControlName="password" [feedback]="false" [toggleMask]="true"
            styleClass="w-full" inputStyleClass="w-full p-3"
            [ngClass]="{'p-invalid': loginForm.get('password')?.invalid && loginForm.get('password')?.touched}"></p-password>
          <div class="text-red-600 text-sm mt-1" *ngIf="loginForm.get('password')?.dirty">
            <span *ngIf="loginForm.get('password')?.errors?.['minlength']">
              A senha deve ter no mínimo 8 caracteres.
            </span>
            <span *ngIf="!loginForm.get('password')?.errors?.['minlength']
          && loginForm.get('password')?.errors?.['pattern']">
              A senha deve conter pelo menos um caractere especial.
            </span>
          </div>
          <label for="password" class="font-medium">
            <i class="pi pi-key mr-2"></i>Senha
          </label>
        </span>
      </div>

      <p-button label="Entrar" [disabled]="loginForm.invalid || loading" [loading]="loading"
        styleClass="w-full p-3 text-lg font-semibold text-white bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 border-0 shadow-lg transition-all duration-300"></p-button>

      <!-- 🔓 BOTÃO DE BYPASS PARA DESENVOLVIMENTO -->
      <div *ngIf="developmentMode" class="mt-4 p-4 bg-yellow-50 border border-yellow-200 rounded-lg">
        <p class="text-yellow-800 text-sm font-medium mb-3">
          <i class="pi pi-wrench mr-2"></i>Modo Desenvolvimento
        </p>
        <p-button
          label="Acesso Rápido (Bypass)"
          icon="pi pi-bolt"
          [loading]="loading"
          (onClick)="devBypassLogin()"
          styleClass="w-full p-2 text-sm bg-yellow-500 hover:bg-yellow-600 border-0 text-white">
        </p-button>
        <p class="text-yellow-600 text-xs mt-2">
          Acesso direto sem autenticação para desenvolvimento
        </p>
      </div>

      <div class="text-center mt-4">
        <a href="#" class="text-indigo-600 hover:text-indigo-800 font-medium text-sm transition-colors duration-200">
          <i class="pi pi-question-circle mr-1"></i>Esqueceu sua senha?
        </a>
      </div>
    </form>

    <ng-template pTemplate="footer">
      <div class="text-center text-gray-500 text-xs py-4 border-t border-gray-100">
        <p>© {{currentYear}} Depilee. Todos os direitos reservados.</p>
      </div>
    </ng-template>
  </p-card>

  <p-toast></p-toast>
</div>
