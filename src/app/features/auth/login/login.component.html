<div class="login-container">
  <div class="background-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="login-split-wrapper">
    <div class="login-left">
      <div class="brand-section">
        <div class="brand-logo">
          <img class="brand-img" src="assets/logo.png" alt="Logo Depilee" />
        </div>
      </div>
    </div>
    <div class="login-right">
      <div class="login-icon-wrapper">
        <i class="pi pi-user login-icon"></i>
      </div>
      <h2 class="login-title">Login</h2>
      <p class="login-subtitle">Insira suas credenciais para continuar</p>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <div class="field">
          <span class="full-width-input input-icon-group">
            <i class="pi pi-envelope input-icon"></i>
            <input
              id="email"
              type="email"
              pInputText
              formControlName="email"
              placeholder="Email"
              [ngClass]="{'p-invalid': loginForm.get('email')?.invalid && submitted}" />
          </span>
          <small *ngIf="loginForm.get('email')?.invalid && submitted" class="p-error block mt-2">
            <span *ngIf="loginForm.get('email')?.errors?.['required']">Email é obrigatório</span>
            <span *ngIf="loginForm.get('email')?.errors?.['email']">Formato de email inválido</span>
          </small>
        </div>

        <div class="field mt-5">
          <span class="full-width-input input-icon-group">
            <i class="pi pi-lock input-icon"></i>
            <input
              id="password"
              type="password"
              pInputText
              formControlName="password"
              placeholder="Senha"
              [ngClass]="{'p-invalid': loginForm.get('password')?.invalid && submitted}" />
          </span>
          <small *ngIf="loginForm.get('password')?.invalid && submitted" class="p-error block mt-2">
            <span *ngIf="loginForm.get('password')?.errors?.['required']">Senha é obrigatória</span>
            <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Mínimo 6 caracteres</span>
          </small>
        </div>

        <div style="display: flex; justify-content: center; width: 100%;">
          <button
            pButton
            pRipple
            class="w-full login-button mt-6"
            type="submit"
            [disabled]="isLoading()">
            <span class="button-content">
              Entrar no Sistema
              <p-progressSpinner
                *ngIf="isLoading()"
                styleClass="button-spinner"
                strokeWidth="4">
              </p-progressSpinner>
            </span>
          </button>
        </div>

        <p-message
          *ngIf="errorMessage()"
          severity="error"
          [text]="errorMessage()"
          class="mt-4 w-full error-message">
        </p-message>
      </form>
    </div>
  </div>
</div>
