<!-- src/app/features/auth/login/login.component.html -->
<div class="login-container">
  <div class="background-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="login-center-wrapper">
    <div class="brand-section">
      <div class="brand-logo">
        <i class="pi pi-shield"></i>
      </div>
      <h1 class="brand-title">Depilee</h1>
      <p class="brand-subtitle">Sistema de Gestão</p>
    </div>

    <p-card class="login-card">
      <div class="card-header">
        <h2>Bem-vindo de volta</h2>
        <p>Entre com suas credenciais para continuar</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <div class="field">
          <span class="p-float-label full-width-input">
            <input
              id="email"
              type="email"
              pInputText
              formControlName="email"
              [ngClass]="{'p-invalid': loginForm.get('email')?.invalid && loginForm.get('email')?.touched}" />
            <label for="email">Email</label>
          </span>
          <small *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="p-error block mt-2">
            <span *ngIf="loginForm.get('email')?.errors?.['required']">Email é obrigatório</span>
            <span *ngIf="loginForm.get('email')?.errors?.['email']">Formato de email inválido</span>
          </small>
        </div>

        <div class="field mt-5">
          <span class="p-float-label full-width-input">
            <input
              id="password"
              type="password"
              pInputText
              formControlName="password"
              [ngClass]="{'p-invalid': loginForm.get('password')?.invalid && loginForm.get('password')?.touched}" />
            <label for="password">Senha</label>
          </span>
          <small *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="p-error block mt-2">
            <span *ngIf="loginForm.get('password')?.errors?.['required']">Senha é obrigatória</span>
            <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Mínimo 6 caracteres</span>
          </small>
        </div>

        <div style="display: flex; justify-content: center; width: 100%;">
          <button
            pButton
            pRipple
            icon="pi pi-sign-in"
            class="w-full login-button mt-6"
            type="submit"
            [disabled]="isLoading()">
            <span class="button-content">
              Entrar no Sistema
              <p-progressSpinner
                *ngIf="isLoading()"
                styleClass="button-spinner"
                strokeWidth="4">
              </p-progressSpinner>
            </span>
          </button>
        </div>

        <p-message
          *ngIf="errorMessage()"
          severity="error"
          [text]="errorMessage()"
          class="mt-4 w-full error-message">
        </p-message>
      </form>
    </p-card>
  </div>
</div>
