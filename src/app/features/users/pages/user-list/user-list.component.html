<div class="user-list-container w-full">
  <div class="header">
    <div class="title-section">
      <h1>Usuários</h1>
      <p>Gerencie os usuários do sistema</p>
    </div>
    <button
      pButton
      icon="pi pi-plus"
      label="Novo Usuário"
      class="p-button-primary"
      (click)="newUser()">
    </button>
  </div>

  <div class="card">
    <p-table
      [value]="users()"
      [loading]="loading()"
      styleClass="p-datatable-striped"
      [paginator]="true"
      [rows]="10"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} usuários">

      <ng-template pTemplate="header">
        <tr>
          <th>Email</th>
          <th>Nome completo</th>
          <th>Ações</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-user>
        <tr>
          <td data-label="Email">{{ user.email }}</td>
          <td data-label="Nome completo">{{ user.fullName }}</td>
          <td data-label="Ações">
            <div class="action-buttons">
              <button
                pButton
                icon="pi pi-pencil"
                class="p-button-sm p-button-primary mr-2"
                (click)="editUser(user.id)">
              </button>
              <button
                pButton
                icon="pi pi-trash"
                class="p-button-sm p-button-danger"
                (click)="deleteUser(user.id, user.fullName)">
              </button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="3" class="text-center py-5">
            <div class="empty-state">
              <i class="pi pi-users" style="font-size: 3rem; color: #ccc"></i>
              <h3>Nenhum usuário encontrado</h3>
              <p>Comece adicionando seu primeiro usuário</p>
              <button
                pButton
                icon="pi pi-plus"
                label="Novo Usuário"
                class="p-button-outlined mt-3"
                (click)="newUser()">
              </button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-toast></p-toast>

<app-confirmation-modal
  [visible]="!!userToDelete"
  [type]="'delete'"
  [loading]="confirmationLoading()"
  [message]="getDeleteMessage()"
  (confirm)="confirmDelete()"
  (cancel)="cancelDelete()">
</app-confirmation-modal>

<app-success-modal
  [visible]="successModalService.visible()"
  [message]="successModalService.message()"
  (visibleChange)="successModalService.hide()">
</app-success-modal>
