<!-- src/app/features/cash-registers/pages/cash-register-form/cash-register-form.component.html -->
<div class="cash-register-form-container w-full">
  <div class="header">
    <button
      pButton
      icon="pi pi-arrow-left"
      pTooltip="Voltar"
      tooltipPosition="top"
      class="p-button-text p-button-sm"
      (click)="onCancel()">
    </button>

    <h1>{{ isEditMode() ? 'Editar Caixa' : 'Novo Caixa' }}</h1>
  </div>

  <div class="card">
    <p-card>
      <form [formGroup]="cashRegisterForm" (ngSubmit)="onSubmit()" class="cash-register-form">
        <div class="form-grid">
          <div class="field col-12">
            <label for="initialBalance" class="block font-medium mb-2">Saldo Inicial *</label>
            <input
              id="initialBalance"
              type="text"
              pInputText
              formControlName="initialBalance"
              class="w-full"
              placeholder="R$ 0,00"
              (focus)="onCurrencyFocus($event)"
              (input)="onCurrencyInput($event)"
              (blur)="formatCurrencyOnBlur($event, 'initialBalance')"
            />
            <small
              *ngIf="cashRegisterForm.get('initialBalance')?.invalid && formSubmitted()"
              class="p-error block mt-1">
              <span *ngIf="cashRegisterForm.get('initialBalance')?.errors?.['required']">Saldo inicial é obrigatório</span>
            </small>
          </div>
          <div class="field col-12">
            <label for="notes" class="block font-medium mb-2">Observações</label>
            <textarea
              id="notes"
              pInputText
              formControlName="notes"
              class="w-full"
              rows="3"
              placeholder="Digite observações (opcional)"></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button
            pButton
            type="button"
            label="Cancelar"
            class="p-button-text"
            [disabled]="confirmationLoading()"
            (click)="onCancel()">
          </button>

          <button
            pButton
            type="submit"
            [label]="isEditMode() ? 'Atualizar' : 'Criar'"
            class="p-button-primary"
            [disabled]="isEditMode() && !formModified()">
          </button>
        </div>
      </form>
    </p-card>
  </div>
</div>

<p-toast></p-toast>

<app-confirmation-modal
  [visible]="showConfirmation()"
  [type]="isEditMode() ? 'update' : 'create'"
  [message]="isEditMode()
    ? 'Tem certeza que deseja atualizar este caixa?'
    : 'Tem certeza que deseja cadastrar este caixa?'"
  [confirmLabel]="isEditMode() ? 'Atualizar' : 'Cadastrar'"
  cancelLabel="Cancelar"
  [loading]="confirmationLoading()"
  (confirm)="confirmSubmit()"
  (cancel)="cancelSubmit()">
</app-confirmation-modal>

<app-success-modal
  [visible]="successModalService.visible()"
  [message]="successModalService.message()"
  (visibleChange)="successModalService.hide()">
</app-success-modal>
