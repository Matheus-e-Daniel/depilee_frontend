<div class="cash-register-list-container w-full">
  <div class="header">
    <div class="title-section">
      <h1>Caixas</h1>
      <p>Gerencie a abertura de caixas</p>
    </div>
    <button
      pButton
      icon="pi pi-plus"
      label="Novo Caixa"
      class="p-button-primary"
      (click)="newCashRegister()">
    </button>
  </div>

  <div class="filters-card">
    <div class="filters-header">
      <div class="filters-title">
        <i class="pi pi-filter"></i>
        <h3>Filtros</h3>
      </div>
      <button
        pButton
        icon="pi pi-times"
        label="Limpar Filtros"
        class="p-button-text p-button-sm clear-filters-btn"
        (click)="searchValue = ''; sortOrderValue = 'desc';"
      ></button>
    </div>
    <div class="filters-content">
      <div class="filter-group">
        <label for="cashRegisterSearch">Buscar por observação</label>
        <span class="p-input-icon-right w-full">
          <input
            id="cashRegisterSearch"
            type="text"
            pInputText
            placeholder="Digite observações..."
            [ngModel]="searchValue"
            (ngModelChange)="searchValue = $event"
            class="w-full cash-register-search-input"
          />
        </span>
      </div>
      <div class="filter-group">
        <label for="cashRegisterSort">Ordenar por</label>
        <p-dropdown
          id="cashRegisterSort"
          [options]="sortOptions"
          [ngModel]="sortOrderValue"
          (ngModelChange)="sortOrderValue = $event"
          optionLabel="label"
          optionValue="value"
          placeholder="Selecione a ordenação"
          class="w-full"
        ></p-dropdown>
      </div>
    </div>
  </div>

  <div class="card">
    <p-table
      [value]="filteredCashRegisters()"
      [loading]="loading()"
      styleClass="p-datatable-striped"
      [paginator]="true"
      [rows]="10"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} caixas">

      <ng-template pTemplate="header">
        <tr>
          <th>Saldo Inicial</th>
          <th>Observações</th>
          <th>Ações</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-cashRegister>
        <tr>
          <td data-label="Saldo Inicial">{{ cashRegister.initialBalance | currency:'BRL' }}</td>
          <td data-label="Observações">{{ cashRegister.notes }}</td>
          <td data-label="Ações">
            <div class="action-buttons">
              <button
                pButton
                icon="pi pi-pencil"
                class="p-button-sm p-button-primary mr-2"
                (click)="editCashRegister(cashRegister.id)">
              </button>
              <button
                pButton
                icon="pi pi-lock"
                class="p-button-sm p-button-warning"
                (click)="openCloseCashRegisterModal(cashRegister.id, cashRegister.notes)">
              </button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="3" class="text-center py-5">
            <div class="empty-state">
              <i class="pi pi-wallet" style="font-size: 3rem; color: #ccc"></i>
              <h3>Nenhum caixa encontrado</h3>
              <p>Comece adicionando seu primeiro caixa</p>
              <button
                pButton
                icon="pi pi-plus"
                label="Novo Caixa"
                class="p-button-outlined mt-3"
                (click)="newCashRegister()">
              </button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>


<app-cash-register-close-form
  [visible]="showCloseModal()"
  [loading]="closeLoading()"
  [cashRegisterId]="cashRegisterToClose && cashRegisterToClose.id ? +cashRegisterToClose.id : 0"
  (confirm)="confirmCloseCashRegister($event)"
  (cancel)="cancelCloseCashRegister()">
</app-cash-register-close-form>

<app-success-modal
  [visible]="successModalService.visible()"
  [message]="successModalService.message()"
  (visibleChange)="successModalService.hide()">
</app-success-modal>
