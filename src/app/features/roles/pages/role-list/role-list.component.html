<div class="role-list-container w-full">

  <div class="header">
    <div class="title-section">
      <h1>Cargos</h1>
      <p>Gerencie seu cadastro de cargos</p>
    </div>
    <button
      pButton
      icon="pi pi-plus"
      label="Novo Cargo"
      class="p-button-primary"
      (click)="newRole()">
    </button>
  </div>

  <div class="filters-card">
    <div class="filters-header">
      <div class="filters-title">
        <i class="pi pi-filter"></i>
        <h3>Filtros</h3>
      </div>
      <button
        pButton
        icon="pi pi-times"
        label="Limpar Filtros"
        class="p-button-text p-button-sm clear-filters-btn"
        (click)="searchValue = ''; sortOrderValue = 'desc';"
      ></button>
    </div>
    <div class="filters-content">
      <div class="filter-group">
        <label for="roleSearch">Buscar por nome</label>
        <span class="p-input-icon-right w-full">
          <input
            id="roleSearch"
            type="text"
            pInputText
            placeholder="Digite o nome do cargo..."
            [ngModel]="searchValue"
            (ngModelChange)="searchValue = $event"
            class="w-full role-search-input"
          />
        </span>
      </div>
      <div class="filter-group">
        <label for="roleSort">Ordenar por</label>
        <p-dropdown
          id="roleSort"
          [options]="sortOptions"
          [ngModel]="sortOrderValue"
          (ngModelChange)="sortOrderValue = $event"
          optionLabel="label"
          optionValue="value"
          placeholder="Selecione a ordenação"
          class="w-full"
        ></p-dropdown>
      </div>
    </div>
  </div>

  <div class="card">
    <p-table
      [value]="filteredRoles()"
      [loading]="loading()"
      styleClass="p-datatable-striped"
      [paginator]="true"
      [rows]="10"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} roles">

      <ng-template pTemplate="header">
        <tr>
          <th>Cargo</th>
          <th style="text-align: right;">Ações</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-role>
        <tr>
          <td data-label="Cargo">{{ role.name }}</td>
          <td data-label="Ações" style="text-align: right;">
            <div class="action-buttons">
              <button
                pButton
                icon="pi pi-pencil"
                class="p-button-sm p-button-primary mr-2"
                (click)="editRole(role.id)">
              </button>
              <button
                pButton
                icon="pi pi-trash"
                class="p-button-sm p-button-danger"
                (click)="deleteRole(role.id)">
              </button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="2" class="text-center py-5">
            <div class="empty-state">
              <i class="pi pi-id-card" style="font-size: 3rem; color: #ccc"></i>
              <h3>Nenhum cargo encontrado</h3>
              <p>Comece adicionando seu primeiro cargo</p>
              <button
                pButton
                icon="pi pi-plus"
                label="Novo Cargo"
                class="p-button-outlined mt-3"
                (click)="newRole()">
              </button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-toast></p-toast>

<app-confirmation-modal
  [visible]="showConfirmation()"
  type="delete"
  [message]="getDeleteMessage()"
  confirmLabel="Excluir"
  cancelLabel="Cancelar"
  [loading]="confirmationLoading()"
  (confirm)="confirmDelete()"
  (cancel)="cancelDelete()">
</app-confirmation-modal>

<app-success-modal
  [visible]="successModalService.visible()"
  [message]="successModalService.message()"
  (visibleChange)="successModalService.hide()">
</app-success-modal>
